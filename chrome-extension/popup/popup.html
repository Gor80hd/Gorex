<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorex Downloader</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <span class="header-title">Gorex</span>
        <div class="header-status">
            <span id="status-dot" class="status-dot"></span>
            <span id="status-text" class="status-text">Проверка...</span>
        </div>
    </header>

    <!-- App offline banner -->
    <div id="offline-banner" class="offline-banner hidden">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>Gorex не запущен</span>
        <button id="launch-app-btn" class="btn btn-outline btn-sm" onclick="openGorex()">Запустить</button>
    </div>

    <!-- URL bar -->
    <div class="url-section">
        <div class="url-bar" id="url-bar">
            <img id="service-icon" class="service-icon" src="" alt="" style="display:none">
            <span id="service-name" class="service-name hidden"></span>
            <span id="url-display" class="url-display">Загрузка...</span>
            <button class="url-copy-btn" id="url-copy-btn" title="Копировать ссылку">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
            </button>
        </div>
        <div id="unsupported-hint" class="hint-text hidden">⚠ Сервис может не поддерживаться yt-dlp</div>
    </div>

    <!-- Main panel -->
    <div id="main-panel" class="main-panel">

        <!-- Video thumbnail preview -->
        <div id="thumb-preview" class="thumb-preview hidden">
            <img id="thumb-img" src="" alt="">
            <div class="thumb-meta">
                <div id="thumb-title" class="thumb-title"></div>
                <div id="thumb-duration" class="thumb-duration hidden"></div>
            </div>
        </div>

        <!-- ── Action tabs (segmented control) ── -->
        <div class="action-tabs">
            <button id="video-tab" class="action-tab" onclick="togglePanel('video')" disabled>
                <span class="tab-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="23 7 16 12 23 17 23 7"/>
                        <rect x="1" y="5" width="15" height="14" rx="2"/>
                    </svg>
                </span>
                <span class="tab-label">Видео</span>
                <span id="video-badge" class="tab-badge hidden">Лучшее</span>
                <svg class="tab-chevron" id="video-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>

            <div class="tabs-sep"></div>

            <button id="audio-tab" class="action-tab" onclick="togglePanel('audio')" disabled>
                <span class="tab-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
                        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
                        <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
                    </svg>
                </span>
                <span class="tab-label">Аудио</span>
                <span id="audio-badge" class="tab-badge">MP3</span>
                <svg class="tab-chevron" id="audio-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
        </div>

        <!-- ── Video panel ── -->
        <div id="video-panel" class="action-panel">
            <div class="panel-inner">
                <div class="panel-content">

                    <!-- Formats loading -->
                    <div id="formats-loading" class="panel-loading hidden">
                        <div class="spinner"></div>
                        <span>Получение форматов...</span>
                    </div>

                    <!-- Format options -->
                    <div id="format-options" class="hidden">

                        <!-- Quality chips -->
                        <div class="chip-group">
                            <div class="chip-label">Качество</div>
                            <div id="quality-grid" class="chips"></div>
                        </div>

                        <!-- Trim -->
                        <div id="trim-section">
                            <div class="option-row">
                                <span class="option-label">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/>
                                        <line x1="20" y1="4" x2="8.12" y2="15.88"/>
                                        <line x1="14.47" y1="14.48" x2="20" y2="20"/>
                                        <line x1="8.12" y1="8.12" x2="12" y2="12"/>
                                    </svg>
                                    Обрезка
                                </span>
                                <label class="toggle toggle-sm">
                                    <input type="checkbox" id="trim-enable-cb">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                            <div id="trim-controls" class="trim-controls hidden">
                                <div class="trim-row">
                                    <label>От</label>
                                    <input type="text" id="trim-start" class="time-input" placeholder="0:00" maxlength="10">
                                    <label>До</label>
                                    <input type="text" id="trim-end" class="time-input" placeholder="конец" maxlength="10">
                                </div>
                                <div id="trim-hint" class="hint-text"></div>
                            </div>
                        </div>

                        <!-- Thumbnail -->
                        <div class="option-row">
                            <span class="option-label">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                                    <polyline points="21 15 16 10 5 21"/>
                                </svg>
                                Скачать превью
                            </span>
                            <label class="toggle toggle-sm">
                                <input type="checkbox" id="thumbnail-cb">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>

                        <!-- Convert -->
                        <div class="option-row">
                            <span class="option-label">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="23 4 23 10 17 10"/>
                                    <polyline points="1 20 1 14 7 14"/>
                                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                                </svg>
                                Конвертировать
                            </span>
                            <label class="toggle toggle-sm">
                                <input type="checkbox" id="convert-cb">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>

                    </div>

                    <!-- Fallback quick download -->
                    <div id="quick-buttons" class="hidden">
                        <button id="quick-download-btn" class="btn btn-primary btn-full" onclick="quickDownload()">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            Скачать лучшее качество
                        </button>
                    </div>

                    <!-- Action buttons -->
                    <div id="action-buttons" class="panel-actions hidden">
                        <button id="download-now-btn" class="btn btn-primary btn-full" onclick="downloadNow()">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            Скачать
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <!-- ── Audio panel ── -->
        <div id="audio-panel" class="action-panel">
            <div class="panel-inner">
                <div class="panel-content">

                    <!-- Format chips -->
                    <div class="chip-group">
                        <div class="chip-label">Формат</div>
                        <div class="chips" id="audio-format-chips">
                            <button class="chip selected" data-val="mp3">MP3</button>
                            <button class="chip" data-val="m4a">M4A</button>
                            <button class="chip" data-val="opus">OPUS</button>
                            <button class="chip" data-val="wav">WAV</button>
                        </div>
                    </div>

                    <!-- Bitrate chips -->
                    <div class="chip-group">
                        <div class="chip-label">Битрейт</div>
                        <div class="chips" id="audio-quality-chips">
                            <button class="chip" data-val="128">128 kbps</button>
                            <button class="chip selected" data-val="192">192 kbps</button>
                            <button class="chip" data-val="320">320 kbps</button>
                        </div>
                    </div>

                    <!-- Action buttons -->
                    <div class="panel-actions">
                        <button id="audio-dl-btn" class="btn btn-primary btn-full" onclick="downloadNowAudio()">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            Скачать
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <!-- Messages -->
        <div id="success-msg" class="success-msg hidden">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
            <span>Добавлено в очередь</span>
        </div>
        <div id="error-msg" class="error-msg hidden"></div>

        <!-- Metadata loading status -->
        <div id="meta-loading" class="meta-loading hidden">
            <div class="meta-loading-bar">
                <div id="meta-loading-fill" class="meta-loading-fill"></div>
            </div>
            <span id="meta-loading-text" class="meta-loading-text">Gorex получает метаданные...</span>
        </div>

    </div>

    <script src="popup.js"></script>
</body>
</html>
